name: RFQOnDemandModel
type: semantic_ontology
description: |
  RFQ 按需（on-demand）输入侧事实；对齐 BSS/ListOnDemandResourceRatings 的 DemandProductInfo。
  与 rfq-period-model.yml 完全独立解耦；维度引用 rfq-shared-dimensions.yml。
  required_fields / 可执行命令模板均在 references/related-commands.md。
pricing_mode: on_demand
source_evidence:
  partner_api_doc: https://support.huaweicloud.com/api-bpconsole/bcloud_01001.html
shared_dimensions_file: rfq-shared-dimensions.yml

facts:
  - name: RFQ_OnDemand_Header
    role: primary
    grain: 每次 ListOnDemandResourceRatings 请求一条记录
    dimensions: [Dim_Project]
    child_facts: [RFQ_OnDemand_Line]
    attributes:
      - { name: project_id,         type: string,  max_length: 64, dimension: Dim_Project }
      - { name: inquiry_precision,  type: integer, required: false, default: 0, enum_documented: { "0": default_6_decimals, "1": full_10_decimals } }

  - name: RFQ_OnDemand_Line
    role: primary
    grain: product_infos[] 中每个 DemandProductInfo 一条记录
    parent_fact: RFQ_OnDemand_Header
    cardinality_max: 100
    degenerate_dimensions: [id, resource_spec]
    dimensions:
      - Dim_CloudServiceType
      - Dim_ResourceType
      - Dim_Region
      - Dim_AvailabilityZone
      - Dim_MeasureUnit
      - Dim_ResourceSpec
      - Dim_UsageType
    attributes:
      - { name: id,                 type: string,  max_length: 64,  notes: "同次询价唯一" }
      - { name: cloud_service_type, type: string,  max_length: 400, dimension: Dim_CloudServiceType }
      - { name: resource_type,      type: string,  max_length: 400, dimension: Dim_ResourceType }
      - { name: resource_spec,      type: string,  max_length: 400, dimension: Dim_ResourceSpec }
      - { name: region,             type: string,  max_length: 64,  dimension: Dim_Region }
      - { name: usage_factor,       type: string,  max_length: 64,  dimension: Dim_UsageType, notes: "大小写不敏感；与话单使用量因子一致，如 Duration / upflow" }
      - { name: usage_value,        type: number,                   notes: "使用量数值，如按小时询价为 1" }
      - { name: usage_measure_id,   type: integer, max: 4, dimension: Dim_MeasureUnit, notes: "使用量单位，如 4=小时、10=GB" }
      - { name: subscription_num,   type: integer, min: 1, max: 10000 }
      - { name: available_zone,     type: string,  max_length: 64, dimension: Dim_AvailabilityZone, required: false, notes: "空/null = 不筛选；大小写不敏感" }
      - { name: resource_size,      type: integer, max: 214783647, required: conditional, condition: linear_product }
      - { name: size_measure_id,    type: integer, dimension: Dim_MeasureUnit, required: conditional, condition: linear_product, notes: "与 resource_size 同填同省" }

linear_product_indicators:
  resource_type_in:
    - hws.resource.type.volume
    - hws.resource.type.bandwidth
    - hws.resource.type.share_bandwidth

# ============================================================
# DIMENSION (on-demand 独有)
# ============================================================
dimensions:
  - name: Dim_UsageType
    kind: conformed_dimension
    business_key: usage_factor_code
    source_operations: [BSS/ListUsageTypes]
    attributes: [code, name, measure_type]
    documented_examples:
      - { code: Duration, applies_to: "ECS / EVS / EIP / 市场镜像", notes: 按时长计费 }
      - { code: upflow,   applies_to: "带宽（按流量）",            notes: 按上行流量计费 }
    notes: |
      code 取自话单使用量因子；与 cloud_service_type/resource_type 组合决定可用枚举。
      首次未知服务可调用 BSS/ListUsageTypes 取响应表 3 中 code。

evidence_boundary:
  - 字段必填以 references/related-commands.md 中 BSS/ListOnDemandResourceRatings 的 contract 块为唯一真源。
  - usage_value 是询价标量，不是历史用量；余额/已发生账单/对账超出 RFQ 范围。
