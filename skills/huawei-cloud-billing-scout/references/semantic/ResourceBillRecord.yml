name: ResourceBillRecord
type: api_fact
source_operation: BSS/ListCustomerselfResourceRecords
grain: 每条资源消费记录一条记录
description: 资源维度消费记录，适合定位持续扣费资源。
dimensions:
  - name: cycle
    path: cycle
    type: time
    description: 查询账期。
  - name: bill_date
    path: fee_records[].bill_date
    type: time
    description: 账单日期。
  - name: cloud_service_type
    path: fee_records[].cloud_service_type
    type: string
    description: 云服务编码。
  - name: resource_type
    path: fee_records[].resource_type
    type: string
    description: 资源类型。
  - name: resource_id
    path: fee_records[].resource_id
    type: string
    description: 资源 ID，输出需脱敏。
  - name: region
    path: fee_records[].region
    type: string
    description: 资源区域。
  - name: enterprise_project_id
    path: fee_records[].enterprise_project_id
    type: string
    description: 企业项目。
  - name: charge_mode
    path: fee_records[].charge_mode
    type: enum
    description: 计费模式。
measures:
  - name: amount
    path: fee_records[].amount
    type: number
    description: 应付金额。
  - name: usage
    path: fee_records[].usage
    type: number
    description: 使用量。
  - name: free_resource_usage
    path: fee_records[].free_resource_usage
    type: number
    description: 资源包抵扣用量。
