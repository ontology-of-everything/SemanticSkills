name: HuaweiCloudBillingSemanticCatalog
type: semantic_catalog
description: 基于 Kimball 思路，将计费意图路由到事实、维度和只读 BSS 操作。
principles:
  - 事实回答金额、用量、权益、订单或关系问题。
  - 维度用于翻译编码和补充上下文，不是扣费证据。
  - 伙伴和企业事实必须先明确账号范围。
  - 报价事实只是估算，已出账事实仍是账务真源。
default_grain_order:
  - account_scope
  - time_window
  - money_basis
  - service_or_resource
  - evidence_level
money_basis:
  billed: [consume_amount, official_amount, discount_amount]
  paid: [cash_amount, credit_amount, coupon_amount, stored_value_card_amount]
  outstanding: [debt_amount]
  amortized: [amortized_cost, shared_month]
domains:
  customer_billing:
    questions: [余额, 欠费, 本月花费, 上月账单, 持续扣费, 删除后扣费, 明细, 流水]
    facts:
      - AccountBalance
      - MonthlyBillSummary
      - BillingStatement
      - ResourceBillRecord
      - ResourceBillDetail
      - AccountChangeRecord
      - StoredValueCard
    operations:
      - ShowCustomerAccountBalances
      - ShowCustomerMonthlySum
      - ListCustomerBillsFeeRecords
      - ListCustomerselfResourceRecords
      - ListCustomerselfResourceRecordDetails
      - ListCustomerAccountChangeRecords
      - ListStoredValueCards
  cost_and_usage:
    questions: [成本分析, TopN, 趋势, 摊销, 使用量, 95计费, OBS流量, CDN用量]
    facts: [CostAnalysis, AmortizedCost, ResourceUsage]
    operations:
      - ListCosts
      - ListCustomerBillsMonthlyBreakDown
      - ListResourceUsageSummary
      - ListResourceUsage
  discount_entitlement:
    questions: [资源包, 余量, 抵扣, 代金券, 优惠券, 储值卡, 券额度]
    facts:
      - FreeResourcePackage
      - CouponChangeRecord
      - CouponQuota
      - PartnerCoupon
    operations:
      - ListFreeResourceInfos
      - ListFreeResourceUsages
      - ListFreeResourcesUsageRecords
      - ListCustomerCouponChangeRecords
      - ListQuotaCoupons
      - ListIssuedCouponQuotas
      - ListCouponQuotasRecords
      - ListIssuedPartnerCoupons
      - ListPartnerCouponsRecord
      - ListSubCustomerCoupons
      - ListOrderCouponsByOrderId
  order_evidence:
    questions: [订单, 退款, 退订, 降配, 折扣, 订单对账]
    facts: [OrderEvidence]
    operations:
      - ListCustomerOrders
      - ShowCustomerOrderDetails
      - ShowRefundOrderDetails
      - ListOrderDiscounts
  enterprise_multi_account:
    questions: [企业主, 子账号, 组织, 多账号, 可拨款, 可回收, 子客户账单]
    facts: [EnterpriseAccountContext, EnterpriseBilling]
    operations:
      - ListEnterpriseOrganizations
      - ListEnterpriseSubCustomers
      - ListEnterpriseMultiAccount
      - ShowMultiAccountTransferAmount
      - ListMultiAccountTransferCoupons
      - ListMultiAccountRetrieveCoupons
      - ListConsumeSubCustomers
      - ListSubcustomerMonthlyBills
      - ListSubCustomerBillDetail
  partner_resale:
    questions: [伙伴, 代售, 经销商, 客户列表, 客户余额, 调账, 新客标签]
    facts: [PartnerAccountContext, PartnerBilling]
    operations:
      - ListSubCustomers
      - ListSubCustomerNewTag
      - ListCustomerOnDemandResources
      - ListPayPerUseCustomerResources
      - ListCustomersBalancesDetail
      - ListPartnerBalances
      - ListPartnerAccountChangeRecords
      - ListPartnerAdjustRecords
      - ListIndirectPartners
  reference_dimensions:
    questions: [服务编码, 资源类型, 使用量类型, 计量单位, 地域, 省市区, 单位换算]
    dimensions: [ServiceType, ResourceType, UsageType, MeasureUnit, Geography]
    operations:
      - ListServiceTypes
      - ListResourceTypes
      - ListUsageTypes
      - ListMeasureUnits
      - ListConversions
      - ListServiceResources
      - ListProvinces
      - ListCities
      - ListCounties
  quote_and_identity:
    questions: [价格试算, 续订金额, 包周期报价, 折扣策略, 实名审核结果]
    facts: [PricingQuote, IdentityReview]
    operations:
      - ListOnDemandResourceRatings
      - ListRateOnPeriodDetail
      - ListRenewRateOnPeriod
      - ListIncentiveDiscountPolicies
      - ShowRealnameAuthenticationReviewResult
coverage:
  expected_query_operations: 58
  generated_from: hcloud BSS --help
  source_version: KooCLI 7.2.2
