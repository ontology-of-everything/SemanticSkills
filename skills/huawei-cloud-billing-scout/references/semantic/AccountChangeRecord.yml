name: AccountChangeRecord
type: api_fact
source_operation: BSS/ListCustomerAccountChangeRecords
grain: one row per cash or credit account transaction
description: 现金、授信、储值类收支流水。
dimensions:
  - name: balance_type
    path: balance_type
    type: enum
    sample_values: [BALANCE_TYPE_DEBIT, BALANCE_TYPE_CREDIT]
    description: 账户类型。
  - name: trade_time
    path: records[].trade_time
    type: time
    description: 交易时间。
  - name: trade_type
    path: records[].trade_type
    type: enum
    description: 交易类型。
  - name: revenue_expense_type
    path: records[].revenue_expense_type
    type: enum
    sample_values: [REVENUE, EXPENSE]
    description: 收入或支出。
  - name: trade_id
    path: records[].trade_id
    type: string
    description: 交易 ID，输出需脱敏。
measures:
  - name: amount
    path: records[].amount
    type: number
    description: 流水金额。
