name: AccountBalance
type: api_fact
source_operation: BSS/ShowCustomerAccountBalances
grain: 每个账户余额快照一条记录
description: 账户余额和欠费快照。
dimensions:
  - name: account_type
    path: account_balances[].account_type
    type: enum
    description: 账户类型。
  - name: currency
    path: currency
    type: string
    description: 币种。
measures:
