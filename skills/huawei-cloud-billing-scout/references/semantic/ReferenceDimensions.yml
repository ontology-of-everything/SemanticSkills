name: ReferenceDimensions
type: dimension_catalog
description: 代码翻译与上下文维度；服务账务解释，但不作为扣费事实。
dimensions:
  - name: ServiceType
    source_operation: BSS/ListServiceTypes
    keys: [service_type_code, service_type_name]
  - name: ResourceType
    source_operation: BSS/ListResourceTypes
    keys: [resource_type_code, resource_type_name]
  - name: UsageType
    source_operation: BSS/ListUsageTypes
    keys: [usage_type, usage_type_name, resource_type_code]
  - name: MeasureUnit
    source_operations: [BSS/ListMeasureUnits, BSS/ListConversions]
    keys: [measure_id, measure_name, measure_type, conversion_factor]
  - name: ServiceResourceRelation
    source_operation: BSS/ListServiceResources
    keys: [service_type_code, resource_type_code]
  - name: Geography
    source_operations: [BSS/ListProvinces, BSS/ListCities, BSS/ListCounties]
    keys: [province_code, city_code, county_code]
usage_rule: 字典先小分页查询；字典缺失时保留原始 code，不编造中文名。
