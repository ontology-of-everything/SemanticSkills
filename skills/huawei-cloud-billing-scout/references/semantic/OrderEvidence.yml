name: OrderEvidence
type: evidence_fact
source_operations:
  - BSS/ListCustomerOrders
  - BSS/ShowCustomerOrderDetails
  - BSS/ShowRefundOrderDetails
  - BSS/ListOrderCouponsByOrderId
  - BSS/ListOrderDiscounts
grain: 每个订单、退款构成、可用券或折扣证据一条记录
description: 订单、退款、可用券和折扣证据；只读解释，不触发支付或退订。
intent_aliases: [订单, 退款, 退订订单, 降配退款, 订单折扣, 订单可用券]
dimensions:
  - name: order_id
    path: order_id
    type: id
    sensitivity: redact_by_default
  - name: customer_id
    path: customer_id
    type: id
    sensitivity: redact_by_default
  - name: service_type_code
    path: service_type_code
    type: code
  - name: status
    path: status
    type: enum
measures:
  - name: order_amount
    path: order_amount
    type: money
  - name: refund_amount
    path: refund_amount
    type: money
  - name: discount_amount
    path: discount_amount
    type: money
evidence_boundary: 订单解释交易和退款来源；消费归因仍需账单事实。
