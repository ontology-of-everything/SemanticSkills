name: StoredValueCard
type: api_fact
source_operation: BSS/ListStoredValueCards
grain: 每张储值卡一条记录
description: 储值卡列表、状态和面额信息；用于解释余额构成和储值卡到账/可用性。
intent_aliases: [储值卡, 储值卡余额, 充值卡, 卡券余额]
dimensions:
  - name: card_id
    path: cards[].card_id
    type: id
    sensitivity: redact_by_default
    description: 储值卡 ID。
  - name: status
    path: cards[].status
    type: enum
    description: 储值卡状态。
  - name: effective_time
    path: cards[].effective_time
    type: time
    description: 生效时间。
  - name: expire_time
    path: cards[].expire_time
    type: time
    description: 失效时间。
measures:
  - name: amount
    path: cards[].amount
    type: money
    description: 储值卡金额或余额。
evidence_boundary: 储值卡列表解释余额来源和卡状态；消费归因仍需账单、详单或账户流水。
